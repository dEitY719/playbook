<!DOCTYPE html>
<html lang="ko" class="theme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superpowers Skills — Platform Comparison</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { interpolate-size: allow-keywords; }

    html.theme-dark {
      --bg: #0A0A0A; --surface: #141414; --surface-hover: #1C1C1C;
      --border: rgba(255,255,255,0.06);
      --text: #EDEDED; --text-secondary: #888;
      --accent: #3b82f6; --accent-secondary: #8b5cf6;
      --positive: #10b981; --negative: #f43f5e; --warning: #f59e0b;
    }
    html.theme-light {
      --bg: #FAFAF9; --surface: #FFFFFF; --surface-hover: #F5F5F4;
      --border: rgba(0,0,0,0.06);
      --text: #0f172a; --text-secondary: #64748b;
      --accent: #2563eb; --accent-secondary: #7c3aed;
      --positive: #059669; --negative: #e11d48; --warning: #d97706;
    }

    body {
      font-family: 'Noto Sans KR', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.7; -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 20px;
    }

    h1, h2, h3 { color: var(--text); letter-spacing: -0.03em; line-height: 1.1; }

    /* ===== Hero ===== */
    .hero {
      text-align: center;
      margin-bottom: 48px;
    }
    .hero-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-desc {
      font-size: 1.05rem;
      color: var(--text-secondary);
      max-width: 480px;
      margin: 0 auto;
    }
    .hero-version {
      display: inline-block;
      margin-top: 12px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 16px;
      font-weight: 500;
    }

    /* ===== Cards Grid ===== */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 900px;
      width: 100%;
    }
    @media (max-width: 700px) {
      .cards { grid-template-columns: 1fr; max-width: 400px; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 24px;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
    }
    .card:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      border-color: var(--card-color, var(--accent));
    }
    .card:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px;
    }

    .card-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 700;
      color: #fff;
      background: var(--card-color);
    }

    .card-name {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .card-badge {
      font-size: 0.75rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      margin-top: auto;
    }

    /* Card accent colors */
    .card--claude  { --card-color: #8b5cf6; }
    .card--codex   { --card-color: #10b981; }
    .card--gemini  { --card-color: #3b82f6; }

    /* ===== Animations ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate { animation: fadeInUp 0.6s ease-out both; }
    .animate.delay-1 { animation-delay: 0.1s; }
    .animate.delay-2 { animation-delay: 0.2s; }
    .animate.delay-3 { animation-delay: 0.3s; }
    .animate.delay-4 { animation-delay: 0.4s; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    /* ===== Menu ===== */
    .viz-menu { position: fixed; top: 16px; right: 16px; z-index: 9999; }
    .viz-menu-toggle {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      backdrop-filter: blur(12px); transition: all 0.2s;
    }
    .viz-menu-toggle:hover { background: var(--surface-hover); }
    .viz-menu-dropdown {
      position: absolute; top: 52px; right: 0; min-width: 200px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px;
      opacity: 0; visibility: hidden; transform: translateY(-8px);
      transition: all 0.2s; backdrop-filter: blur(16px);
    }
    .viz-menu-dropdown.open { opacity: 1; visibility: visible; transform: translateY(0); }
    .viz-menu-dropdown button {
      width: 100%; padding: 10px 14px; border: none; border-radius: 8px;
      background: transparent; color: var(--text); font-size: 14px;
      font-family: inherit; cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 10px; transition: background 0.15s;
    }
    .viz-menu-dropdown button:hover { background: var(--surface-hover); }

    /* ===== Print ===== */
    @media print {
      body { background: white !important; color: black !important; }
      .viz-menu { display: none; }
      .card { break-inside: avoid; border: 1px solid #ddd; box-shadow: none; }
      * { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    }
    @page { margin: 1in; }

    /* ===== Skip Link ===== */
    .skip-link {
      position: absolute; left: -9999px; top: auto;
      width: 1px; height: 1px; overflow: hidden; z-index: 10000;
      padding: 8px 16px; background: var(--accent); color: white;
      text-decoration: none; border-radius: 4px;
    }
    .skip-link:focus {
      position: fixed; left: 16px; top: 16px;
      width: auto; height: auto; overflow: visible;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link" tabindex="0">Skip to content</a>

  <!-- Menu -->
  <div class="viz-menu">
    <button class="viz-menu-toggle" onclick="toggleMenu()" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="17" y2="15"/>
      </svg>
    </button>
    <div class="viz-menu-dropdown" id="vizMenuDropdown">
      <button onclick="cycleTheme()">
        <span id="themeIcon">
          <svg class="theme-icon-dark" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          <svg class="theme-icon-light" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </span>
        <span id="themeLabel">Dark</span>
      </button>
      <button onclick="downloadImage()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg><span>Download PNG</span></button>
      <button onclick="window.print()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg><span>Print / PDF</span></button>
    </div>
  </div>

  <main id="main-content" role="main">
    <!-- Hero -->
    <section class="hero animate">
      <h1 class="hero-title">Superpowers Skills</h1>
      <p class="hero-desc">같은 스킬을 Claude, Codex, Gemini가 각각 어떻게 설명하는지 비교합니다.</p>
      <span class="hero-version">v5.0.7</span>
    </section>

    <!-- Platform Cards -->
    <section class="cards" aria-label="Platform selection">
      <a href="../../index-C/interactive/" class="card card--claude animate delay-2" aria-label="Claude Code 버전 보기">
        <div class="card-icon">C</div>
        <div class="card-name">Claude Code</div>
        <div class="card-desc">대기 분위기 효과와 플로우 다이어그램 중심의 시각화</div>
        <span class="card-badge">index-C.html</span>
      </a>

      <a href="../../index-CX/interactive/" class="card card--codex animate delay-3" aria-label="Codex 버전 보기">
        <div class="card-icon">CX</div>
        <div class="card-name">Codex</div>
        <div class="card-desc">목차 기반의 구조적 문서 스타일 레이아웃</div>
        <span class="card-badge">index-CX.html</span>
      </a>

      <a href="../../index-G/interactive/" class="card card--gemini animate delay-4" aria-label="Gemini 버전 보기">
        <div class="card-icon">G</div>
        <div class="card-name">Gemini</div>
        <div class="card-desc">그리드 카드와 플로우차트 중심의 깔끔한 정리</div>
        <span class="card-badge">index-G.html</span>
      </a>
    </section>
  </main>

  <script>
    // === Menu ===
    var dropdown = document.getElementById('vizMenuDropdown');
    var themeIconDark = document.querySelector('#themeIcon .theme-icon-dark');
    var themeIconLight = document.querySelector('#themeIcon .theme-icon-light');
    var themeLabel = document.getElementById('themeLabel');
    function toggleMenu() {
      if (dropdown) dropdown.classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.viz-menu')) {
        if (dropdown) dropdown.classList.remove('open');
      }
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        if (dropdown) dropdown.classList.remove('open');
      }
    });

    // === Theme ===
    var savedTheme = localStorage.getItem('viz-theme');
    var currentTheme = savedTheme || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    function applyTheme(t) {
      document.documentElement.className = 'theme-' + t;
      if (themeIconDark) themeIconDark.style.display = t === 'dark' ? '' : 'none';
      if (themeIconLight) themeIconLight.style.display = t === 'dark' ? 'none' : '';
      if (themeLabel) themeLabel.textContent = t === 'dark' ? 'Dark' : 'Light';
      localStorage.setItem('viz-theme', t);
      currentTheme = t;
    }
    function cycleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
    applyTheme(currentTheme);

    // === Download PNG ===
    async function downloadImage() {
      try {
        var url = await htmlToImage.toPng(document.body, { quality: 1, pixelRatio: 2, filter: function(n) { return !n.classList || !n.classList.contains('viz-menu'); } });
        var a = document.createElement('a'); a.href = url;
        a.download = 'superpowers-skills-comparison.png'; a.click();
      } catch(e) {
        console.error('Download failed:', e);
      }
    }
  </script>
</body>
</html>
